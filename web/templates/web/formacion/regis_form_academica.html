{% extends 'web/base/base.html' %}

{% block content %}
<div class="alumno-container">


    <h2>Registro Académico</h2>
    <p>Paso 3: Formación Académica</p>
    <p>I.E en donde realizó sus estudios</p>

    <form method="POST">
        {% csrf_token %}

        <div class="row">
            <div class="col-md-6">
                <label>Institución *</label>
                <input type="text" name="nombre_ie" class="form-control" >
            </div>
            <div class="col-md-6">
                <label>Distrito *</label>
                <input type="text" name="distrito_ie" class="form-control" >
            </div>

            <div class="col-md-6">
                <label>Tipo de institución *</label>
                <select name="tipo_institucion" class="form-control" >
                    <option value="">Seleccione</option>
                    <option>Nacional</option>
                    <option>Particular</option>
                </select>
            </div>


        </div>

        <br>

        <a href="{% url 'registrar_apoderado' %}" class="btn btn-secondary">← Anterior</a>
        <button class="btn-guardar" type="submit">
            Siguiente →
        </button>

    </form>
</div>

{% endblock %}
