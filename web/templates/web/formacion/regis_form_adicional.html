{% extends 'web/base/base.html' %}

{% block content %}
<div class="alumno-container">


    <h2>Registro Académico Adcional</h2>
    <p>Paso 4: Formación Académica</p>
    <p>I.E en donde realizó sus estudios</p>

    <form method="GET">
        {% csrf_token %}

        <div class="row">
            <div class="form-group">
                <label>¿Has estudiado en alguna academia anteriormente</label><br>

                <input type="radio" name="experiencia" value="si"> Sí
                <input type="radio" name="experiencia" value="no"> No
            </div>
            <div class="col-md-6">
                <label>Nombre de la carrera profesional de tu interes: *</label>
                <input type="text" name="profesion" class="form-control" required>
            </div>
            <div class="col-md-6">
                <label>Nombre de la segunda carrera profesional de tu interes: *</label>
                <input type="text" name="segunda_profesion" class="form-control" required>
            </div>

            <div class="col-md-6">
                <label>Tipo de institución *</label>
                <select name="nivel" class="form-control" required>
                    <option value="">Seleccione</option>
                    <option>Nacional</option>
                    <option>Particular</option>
                </select>
            </div>


        </div>

        <br>

        <a href="{% url 'regis_form_academica' %}" class="btn btn-secondary">← Anterior</a>
        <button class="btn-guardar">
            Guardar Registro
        </button>

    </form>
</div>

{% endblock %}
