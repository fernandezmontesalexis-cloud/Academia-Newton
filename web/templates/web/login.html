{% extends 'web/base.html' %}
{% load static %}

{% block content %}

<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap');

/* 🔥 NUEVO: aseguramos altura total */
html, body {
    height: 100%;
}

/* Ocultar navbar del base */
nav, .navbar, header, .topbar {
    display: none !important;
}

/* 🔥 CAMBIO IMPORTANTE AQUÍ */
.login-background {
    position: fixed;           /* 🔥 cambiado */
    top: 0;                    /* 🔥 agregado */
    left: 0;                   /* 🔥 agregado */
    width: 100vw;              /* 🔥 cambiado */
    height: 100vh;             /* 🔥 cambiado */
    background: url("{% static 'web/img/fondonewton.jpg' %}") no-repeat center center;
    background-size: cover;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 0;                /* 🔥 agregado */
}

.login-background::before {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(5, 20, 50, 0.55);
    backdrop-filter: blur(2px);
}

/* 🔥 CAMBIO: aseguramos que la tarjeta esté encima */
.login-wrapper {
    position: relative;
    z-index: 2;                /* 🔥 cambiado de 1 a 2 */
    width: 100%;
    max-width: 480px;
    padding: 20px;
}

.card-login {
    border-radius: 28px;
    overflow: hidden;
    box-shadow: 0 40px 80px rgba(0, 0, 0, 0.45);
    background: #fff;
}

.card-header-img {
    height: 200px;
    background-image: url("{% static 'web/img/newtonpreacademia.jpg' %}");
    background-size: cover;
    background-position: center top;
    position: relative;
}

.card-header-img::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, rgba(10,30,80,0.3) 0%, rgba(10,30,80,0.75) 100%);
}

.card-header-text {
    position: absolute;
    bottom: 24px;
    left: 0;
    right: 0;
    text-align: center;
    z-index: 2;
    color: #fff;
}

.login-title {
    font-size: 32px;
    font-weight: 800;
}

.login-subtitle {
    font-size: 13px;
    font-weight: 300;
    letter-spacing: 3px;
    text-transform: uppercase;
    opacity: 0.85;
}

.card-body-form {
    padding: 36px 40px 40px;
}

.alert-error {
    font-size: 14px;
    color: #c0392b;
    background: #fdf0ef;
    border: 1px solid #f5c6c3;
    border-radius: 10px;
    padding: 10px 14px;
    margin-bottom: 20px;
    font-weight: 500;
}

.field-group {
    margin-bottom: 16px;
    font-size: 15px;
}

.field-label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #8892a4;
    margin-bottom: 7px;
}

.form-control {
    width: 100%;
    height: 52px;
    font-size: 16px;
    color: #1a2540;
    background: #f4f7fb;
    border: 2px solid transparent;
    border-radius: 14px;
    padding: 0 18px;
    outline: none;
    transition: 0.25s;
}

.form-control:focus {
    background: #fff;
    border-color: #1976d2;
    box-shadow: 0 0 0 4px rgba(25, 118, 210, 0.12);
}

.btn-login {
    display: block;
    width: 100%;
    height: 54px;
    margin-top: 24px;
    font-size: 16px;
    font-weight: 700;
    color: #fff;
    background: linear-gradient(135deg, #1e88e5 0%, #0d47a1 100%);
    border: none;
    border-radius: 14px;
    cursor: pointer;
    transition: 0.25s;
}

.btn-login:hover {
    transform: translateY(-2px);
}

.card-footer-text {
    text-align: center;
    margin-top: 20px;
    font-size: 12px;
    color: #aab0bc;
}
</style>

<div class="login-background">
    <div class="login-wrapper">
        <div class="card-login">

            <div class="card-header-img">
                <div class="card-header-text">
                    <div class="login-title">Newton en Red</div>
                    <div class="login-subtitle">Sistema Académico · Sede Huaura</div>
                </div>
            </div>

            <div class="card-body-form">

                {% if messages %}
                    {% for message in messages %}
                        <div class="alert-error">{{ message }}</div>
                    {% endfor %}
                {% endif %}

                <form method="post">
                    {% csrf_token %}

                    <div class="field-group">
                        <label class="field-label">Usuario</label>
                        <input type="text" name="username" placeholder="Ingrese Usuario" class="form-control" required>
                    </div>

                    <div class="field-group">
                        <label class="field-label">Contraseña</label>
                        <input type="password" name="password" placeholder="Ingrese Contraseña" class="form-control" required>
                    </div>

                    <button type="submit" class="btn-login">
                        Ingresar al Sistema
                    </button>
                </form>

                <div class="card-footer-text">
                    Academia Newton — Huaura, Perú
                </div>

            </div>
        </div>
    </div>
</div>

{% endblock %}
