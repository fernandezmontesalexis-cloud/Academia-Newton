{% extends 'web/base.html' %}
{% load static %}

{% block content %}

<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap');

html, body {
    height: 100%;
    margin: 0;
    font-family: 'Outfit', sans-serif;
}

nav, .navbar, header, .topbar {
    display: none !important;
}

.login-background {
    position: fixed;
    inset: 0;
    background: url("{% static 'web/img/fondonewton.jpg' %}") no-repeat center center;
    background-size: cover;
    display: flex;
    align-items: center;
    justify-content: center;
}

.login-background::before {
    content: '';
    position: absolute;
    inset: 0;
    backdrop-filter: blur(3px);
    background: rgba(0,0,0,0.25);
}

.login-wrapper {
    position: relative;
    z-index: 2;
    width: 100%;
    max-width: 450px;
    padding: 20px;
}

.card-login {
    border-radius: 25px;
    overflow: hidden;
    box-shadow: 0 35px 70px rgba(0, 0, 0, 0.45);
    background: #ffffff;
}

/* 🔥 HEADER CON IMAGEN COMPLETA */
.card-header-img {
    height: 180px;
    background: url("{% static 'web/img/logoN.jpg' %}") no-repeat center center;
    background-size: cover;
}
/* Si quieres que sea imagen tipo banner real usa cover en vez de contain */

.card-body-form {
    padding: 35px 35px 40px;
}

.alert-error {
    font-size: 14px;
    color: #c0392b;
    background: #fdf0ef;
    border: 1px solid #f5c6c3;
    border-radius: 10px;
    padding: 10px 14px;
    margin-bottom: 20px;
    font-weight: 500;
}

.field-group {
    margin-bottom: 18px;
}

.field-label {
    display: block;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #7b8794;
    margin-bottom: 6px;
}

.form-control {
    width: 100%;
    height: 50px;
    font-size: 15px;
    background: #f4f7fb;
    border: 2px solid transparent;
    border-radius: 12px;
    padding: 0 16px;
    outline: none;
    transition: all 0.3s ease;
}

.form-control:focus {
    background: #ffffff;
    border-color: #1976d2;
    box-shadow: 0 0 0 3px rgba(25,118,210,0.15);
}

.btn-login {
    width: 100%;
    height: 52px;
    margin-top: 25px;
    font-size: 16px;
    font-weight: 700;
    color: #ffffff;
    background: linear-gradient(135deg, #1e88e5 0%, #0d47a1 100%);
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: 0.3s ease;
}

.btn-login:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 20px rgba(0,0,0,0.25);
}

.card-footer-text {
    text-align: center;
    margin-top: 20px;
    font-size: 12px;
    color: #9aa3af;
}
</style>

<div class="login-background">
    <div class="login-wrapper">
        <div class="card-login">

            <!-- 🔥 HEADER CON IMAGEN COMPLETA -->
            <div class="card-header-img"></div>

            <div class="card-body-form">

                {% if messages %}
                    {% for message in messages %}
                        <div class="alert-error">{{ message }}</div>
                    {% endfor %}
                {% endif %}

                <form method="post">
                    {% csrf_token %}

                    <div class="field-group">
                        <label class="field-label">Usuario</label>
                        <input type="text" name="username" placeholder="Ingrese Usuario" class="form-control" required>
                    </div>

                    <div class="field-group">
                        <label class="field-label">Contraseña</label>
                        <input type="password" name="password" placeholder="Ingrese Contraseña" class="form-control" required>
                    </div>

                    <button type="submit" class="btn-login">
                        Ingresar al Sistema
                    </button>
                </form>

                <div class="card-footer-text">
                    Academia Newton — Huaura, Perú
                </div>

            </div>
        </div>
    </div>
</div>

{% endblock %}
