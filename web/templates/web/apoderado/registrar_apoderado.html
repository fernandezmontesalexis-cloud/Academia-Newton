{% extends 'web/base/base.html' %}
{% load static %}
{% block content %}
<div class="alumno-container">

<h1>Registro Académico</h1>
<p class="subtitle">Paso 2: Datos del apoderado</p>
<form method="POST">
{% csrf_token %}

<!-- DATOS APODERADO -->
<div class="form-section">
<h2>Apoderado</h2>

<div class="form-grid">

<div class="form-group">
<label>Nombre Completo *</label>
<input type="text" name="nombre_apoderado">
</div>

<div class="form-group">
<label>DNI *</label>
<input type="text" name="dni_apoderado">
</div>

<div class="form-group">
<label>Celular *</label>
<input type="text" name="celular_apoderado">
</div>

<div class="form-group">
<label>Dirección</label>
<input type="text" name="direccion_apoderado">
</div>

</div>
</div>
<a href="{% url 'registrar_alumno' %}" class="btn btn-secondary">
← Anterior
</a>
<button class="btn-guardar">
Guardar Registro
</button>

</form>

</div>

{% endblock %}
